<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gym-site</title>
  </head>
  <body>
    <div id="root">
      <style>
        body {
          background-color: #121212; /* Matches gym site dark theme */
          margin: 0;
          padding: 0;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
        }
        .initial-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 20px;
          color: #e0e0e0;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .initial-loader-spinner {
          width: 50px;
          height: 50px;
          border: 4px solid rgba(255, 60, 0, 0.3); /* Brand orange */
          border-top-color: #ff3c00;
          border-radius: 50%;
          animation: initial-spin 1s linear infinite;
        }
        @keyframes initial-spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="initial-loader">
        <div class="initial-loader-spinner"></div>
        <h2>Loading Gym Site...</h2>
      </div>
    </div>
    <script>
      window.global = window;
      var global = window;
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
